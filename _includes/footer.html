<script>
  (function() {
    console.log('[SidebarScroll] 脚本已加载'); // 确保这行出现

    var STORAGE_KEY = 'chirpy-sidebar-scroll';
    var sidebar = null;

    function getSidebar() {
      if (sidebar && sidebar.isConnected) return sidebar;
      sidebar = document.querySelector('#sidebar');
      return sidebar;
    }

    function restoreScroll() {
      var sidebarEl = getSidebar();
      if (!sidebarEl) {
        console.log('[SidebarScroll] ❌ 找不到 #sidebar');
        return;
      }
      var saved = sessionStorage.getItem(STORAGE_KEY);
      console.log('[SidebarScroll] 📥 读取保存位置:', saved);
      if (saved !== null) {
        var pos = parseInt(saved, 10);
        if (!isNaN(pos)) {
          sidebarEl.scrollTop = pos;
          console.log('[SidebarScroll] ✅ 恢复滚动位置到', pos);
        } else {
          console.log('[SidebarScroll] ⚠️ 保存的值无效:', saved);
        }
      } else {
        console.log('[SidebarScroll] ℹ️ 没有保存的位置');
      }
    }

    function saveScroll(reason) {
      var sidebarEl = getSidebar();
      if (!sidebarEl) {
        console.log('[SidebarScroll] ❌ 保存时找不到侧边栏');
        return;
      }
      var currentPos = sidebarEl.scrollTop;
      sessionStorage.setItem(STORAGE_KEY, currentPos);
      console.log('[SidebarScroll] 💾 保存位置', currentPos, '原因:', reason);
    }

    function init() {
      console.log('[SidebarScroll] 🚀 初始化');
      restoreScroll();
      window.addEventListener('beforeunload', function() {
        saveScroll('beforeunload');
      });
      // 监听侧边栏内的链接点击，立即保存
      var sidebarEl = getSidebar();
      if (sidebarEl) {
        var links = sidebarEl.querySelectorAll('a');
        links.forEach(function(link) {
          link.addEventListener('click', function() {
            saveScroll('link-click');
          });
        });
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>
